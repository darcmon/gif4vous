services:
  localstack:
    image: localstack/localstack:latest
    container_name: gif-localstack
    ports:
      - '4566:4566'
    environment:
      - DEBUG=0
      - PERSISTENCE=1 # keep uploaded objects across container restarts
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
    volumes:
      - localstack-data:/var/lib/localstack
      - ./localstack/init/ready.d:/etc/localstack/init/ready.d

  postgres:
    image: postgres:16-alpine
    container_name: gif-postgres
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=gif
      - POSTGRES_PASSWORD=gif
      - POSTGRES_DB=gif_library
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  localstack-data:
  postgres-data:
